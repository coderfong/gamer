<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Wheel — Live Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; background: #FFF1D6; height: 100%; overflow: hidden; }
    #root { height: 100%; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="../games/system.jsx"></script>
  <script type="text/babel" src="../games/shell.jsx"></script>
  <script type="text/babel" src="../games/spinwheel.jsx"></script>
  <script type="text/babel">
    function DemoApp() {
      const [result, setResult] = React.useState(null);
      const [plays, setPlays] = React.useState(99);
      function onResult(prize) { setResult(prize); }
      function reset() { setResult(null); }
      let body;
      if (result) {
        body = <ResultCard prize={result} onAgain={reset} onHome={reset} plays={plays} />;
      } else {
        body = (
          <GameBG base={POP.grape} glow={POP.bubble} pattern="dots">
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column" }}>
              <SpinWheel onResult={onResult} plays={plays} />
            </div>
          </GameBG>
        );
      }
      return (
        <div style={{ width: "100%", height: "100%", position: "relative", overflow: "hidden" }}>
          {body}
          <ConfettiCanvas />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<DemoApp />);
  </script>
</body>
</html>
